app = "prospect-hunter"
primary_region = "cdg"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[mounts]
  source = "data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
